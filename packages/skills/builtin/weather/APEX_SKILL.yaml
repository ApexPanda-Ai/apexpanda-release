name: weather
version: 1.0.0
description: 天气查询，基于 Open-Meteo 免费 API，支持全球城市，无需 API Key
author: ApexPanda
license: MIT

permissions:
  - id: network
    scope: outbound
    description: 访问 Open-Meteo 天气 API

tools:
  - id: getCurrent
    description: 查询指定城市当前天气（温度、湿度、风速、天气描述）。传 city 参数如「北京」，支持国内外城市名
    handler: weather#getCurrent
    parameters:
      type: object
      properties:
        city:
          type: string
          description: 城市名称，如 北京、上海、兰州、深圳。用户说「XX天气」时传 city
        latitude:
          type: number
          description: 纬度，与 longitude 配合使用，可选
        longitude:
          type: number
          description: 经度，与 latitude 配合使用，可选
      required: []

compatibility:
  apexAgent: ">=0.1.0"
  openClaw: false
