name: tts-aliyun
version: 1.0.0
description: 阿里云智能语音 TTS。需配置 ALIYUN_ACCESS_KEY_ID、ALIYUN_ACCESS_KEY_SECRET、ALIYUN_NLS_APPKEY（智能语音交互项目 Appkey）
author: ApexPanda
license: MIT

permissions:
  - id: network
    scope: outbound
    description: 调用阿里云智能语音交互 TTS API

tools:
  - id: synthesize
    description: 将文本合成为语音。text 待合成文本（≤300字），voice 默认 xiaoyun，format 默认 mp3，sampleRate 默认 16000
    handler: tts-aliyun#synthesize
    parameters:
      type: object
      properties:
        text: { type: string, description: 待合成文本，≤300字 }
        voice: { type: string, description: 音色，默认 xiaoyun }
        format: { type: string, description: 输出格式，默认 mp3 }
        sampleRate: { type: number, description: 采样率，默认 16000 }
      required: [text]

compatibility:
  apexAgent: ">=0.1.0"
  openClaw: false
