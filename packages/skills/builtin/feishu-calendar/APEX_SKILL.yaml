name: feishu-calendar
version: 1.0.0
description: 飞书日历查询、创建日程。需配置 FEISHU_APP_ID、FEISHU_APP_SECRET
author: ApexPanda
license: MIT

permissions:
  - id: network
    scope: outbound
    description: 调用飞书开放平台日历 API

tools:
  - id: getPrimary
    description: 获取当前应用的主日历 ID（用于创建、查询日程）
    handler: feishu-calendar#getPrimary
    parameters:
      type: object
      properties: {}
      required: []
  - id: listEvents
    description: 查询日历下的日程列表。calendarId 为日历 ID，startTime/endTime 为 ISO 时间范围
    handler: feishu-calendar#listEvents
    parameters:
      type: object
      properties:
        calendarId: { type: string, description: 日历 ID }
        startTime: { type: string, description: 开始时间 ISO }
        endTime: { type: string, description: 结束时间 ISO }
        pageToken: { type: string }
      required: [calendarId, startTime, endTime]
  - id: createEvent
    description: 创建日程。calendarId、summary、startTime、endTime 必填，description 可选
    handler: feishu-calendar#createEvent
    parameters:
      type: object
      properties:
        calendarId: { type: string }
        summary: { type: string, description: 日程标题 }
        startTime: { type: string, description: 开始时间 ISO }
        endTime: { type: string, description: 结束时间 ISO }
        description: { type: string }
      required: [calendarId, summary, startTime, endTime]

compatibility:
  apexAgent: ">=0.1.0"
  openClaw: false
