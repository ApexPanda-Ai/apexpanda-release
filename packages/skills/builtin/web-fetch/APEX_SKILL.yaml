name: web-fetch
version: 1.0.0
description: 网页抓取、正文提取、Markdown 转换
author: ApexPanda
license: MIT

permissions:
  - id: network
    scope: outbound
    description: 访问外部 URL

tools:
  - id: fetch_url
    description: 抓取 URL 页面内容并转为 Markdown
    handler: web-fetch#fetchUrl
    parameters:
      type: object
      properties:
        url: { type: string, description: 要抓取的完整 URL，需以 http:// 或 https:// 开头 }
      required: [url]

compatibility:
  apexAgent: ">=0.1.0"
  openClaw: false
